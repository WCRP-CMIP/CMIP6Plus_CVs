name: CV tests

on:
  push:
    branches:
      - esgvoc
      - esgvoc_dev

  pull_request:
    branches:
      - esgvoc
      - esgvoc_dev

jobs:
  cv_tests:
    name: Run cv tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: test
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          uvx esgvoc test run cmip6plus \
            --branch "$BRANCH" \
            --universe-branch "$BRANCH"
